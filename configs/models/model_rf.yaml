model:
  type: "RandomForestRegressor"
  parameters:
    n_estimators: 100
    max_depth: None
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: "sqrt"
    bootstrap: true
    random_state: 42
    n_jobs: -1

output:
  model_path: "models/random_forest_model.pkl"
  metrics_path: "metrics/random_forest_metrics.json"