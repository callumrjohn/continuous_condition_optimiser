model:
  type: "RandomForestRegressor"
  model_dir: src/models/architectures/
  model_config_dir: configs/models/
  parameters:
    n_estimators: 100
    max_depth: 6
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: "sqrt"
    bootstrap: true
    random_state: 42
    n_jobs: -1

output:
  output_model_dir: outputs/trained_models/
  output_metrics_dir: outputs/model_metrics/