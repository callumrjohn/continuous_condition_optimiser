data:
  yield_path: data/exp_data.csv
  features_dir: data/features/
  model_input_dir: data/model_input/
  

featurisation:
  smiles_path: data/smiles.csv
  smiles_column: smiles
  id_column: substrate_id
  method: null
  output_features_path: null
  parameters:

    # Morgan Fingerprints
    radius: 2
    n_bits: 2048
    
    # RDKit descriptors
    descriptors: null
    ignore_3d: true
    timeout: 10
    
    missingVal: np.NaN
    silent: True

    n_jobs: -1


preprocessing:
  melt: True
  encode: True
  join_key: substrate_id
  join_type: inner
  duplicate_selection: first
  missing_strategy: drop
  feature_columns: null
  var_name: null
  value_name: null
  drop_nan: True
  one_hot_encode_columns:
    - reagent
  # - extend if mulitple columns need to be one-hot encoded


training:
  columns_to_remove: null
  target_variables: null
  test_size: 0.2
  cv_folds: 5
  random_state: 42
  scoring_strategy: null


model:
  type: null
  model_dir: src/models/architectures/
  model_config_dir: configs/models/
  model_output_dir: output/trained_models/
  parameters:
    n_estimators: 100
    max_depth: None
    min_samples_split: 2
    min_samples_leaf: 1
    max_features: "sqrt"
    bootstrap: true
    random_state: 42
    n_jobs: -1


metrics:
  threshold: 0.9
  iter_step: 0.1
  output_path: null


logging:
  save_logs: true
  log_level: INFO
  log_dir: logs/


output:
  model_path: null
  metrics_path: null
  feature_importance_path: null
  predictions_path: null
